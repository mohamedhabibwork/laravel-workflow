name: Dependency Review

on:
  pull_request:
    paths:
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/dependency-review.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
