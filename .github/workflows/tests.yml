name: tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/tests.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - 'phpunit.xml.dist'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/tests.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - 'phpunit.xml.dist'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            laravel: '10.*'
            testbench: '8.*'
            experimental: false
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
            experimental: false
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            experimental: false
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            experimental: true
          - php: '8.3'
            laravel: '10.*'
            testbench: '8.*'
            experimental: true
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            experimental: true
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            experimental: true
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
            experimental: true
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
            experimental: true
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            experimental: true
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            experimental: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Show dependency set
        run: composer show -D

      - name: Run Pest
        run: vendor/bin/pest --ci
